<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QuestResume</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-light: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent-dark: #0284c7;
    --ok: #4ade80;
    --error: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--panel-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  header h1 {
    margin: 0;
    font-size: 1.4rem;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.85rem;
  }
  nav {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--panel-light);
  }
  nav button {
    background: transparent;
    border: 1px solid var(--panel-light);
    color: var(--text);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  nav button.active {
    background: var(--accent-dark);
    border-color: var(--accent-dark);
    color: #fff;
  }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem;
  }
  section { display: none; }
  section.active { display: block; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-light);
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .panel h2 {
    margin: 0 0 1rem 0;
    font-size: 1.1rem;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .field { margin-bottom: 0.9rem; }
  input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 0.55rem 0.7rem;
    border-radius: 6px;
    border: 1px solid var(--panel-light);
    background: #0b1220;
    color: var(--text);
    font-size: 0.95rem;
  }
  .row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .row > .field { flex: 1; min-width: 160px; }
  button.primary {
    background: var(--accent-dark);
    color: #fff;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
  }
  button.primary:hover { background: var(--accent); }
  button.primary:disabled { opacity: 0.5; cursor: default; }
  .status-line {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.75rem;
    white-space: pre-wrap;
  }
  .status-ok { color: var(--ok); }
  .status-error { color: var(--error); }
  .chat-log {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    margin-bottom: 1rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .msg {
    padding: 0.7rem 0.9rem;
    border-radius: 8px;
    line-height: 1.4;
  }
  .msg.question { background: var(--panel-light); align-self: flex-end; max-width: 85%; }
  .msg.answer { background: #0b1220; border: 1px solid var(--panel-light); }
  .msg .sources {
    margin-top: 0.5rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .msg .sources a {
    color: #6ea8fe;
    text-decoration: underline;
    margin: 0 0.15rem;
  }
  .ask-row { display: flex; gap: 0.5rem; }
  .ask-row input { flex: 1; }
  .result-item {
    border-bottom: 1px solid var(--panel-light);
    padding: 0.6rem 0;
    font-size: 0.9rem;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item .meta { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.2rem; }
  .badge {
    display: inline-block;
    font-size: 0.75rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    background: var(--panel-light);
    color: var(--muted);
    margin-left: 0.4rem;
  }
  .result-item mark, .msg mark {
    background: var(--accent-dark);
    color: #fff;
    border-radius: 3px;
    padding: 0 0.1rem;
  }
  .doc-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    border-bottom: 1px solid var(--panel-light);
    padding: 0.6rem 0;
    font-size: 0.9rem;
  }
  .doc-item:last-child { border-bottom: none; }
  .doc-item .meta { color: var(--muted); font-size: 0.8rem; }
  .doc-item .info { flex: 1; min-width: 0; }
  .tags-row { display: flex; gap: 0.4rem; margin-top: 0.35rem; align-items: center; }
  .tags-row input[type="text"] { width: auto; flex: 1; font-size: 0.8rem; padding: 0.3rem 0.5rem; }
  .tags-row button { font-size: 0.8rem; padding: 0.3rem 0.7rem; }
  .tags-row .status-line { font-size: 0.75rem; margin: 0; }
  button.danger {
    background: transparent;
    border: 1px solid var(--error);
    color: var(--error);
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  button.danger:hover { background: var(--error); color: #fff; }
  .report-list {
    margin: 0;
    padding-left: 1.2rem;
    font-size: 0.85rem;
  }
  .report-list li { margin-bottom: 0.3rem; }
</style>
</head>
<body>
<header>
  <div>
    <h1>QuestResume</h1>
    <p>Busca e perguntas offline sobre seus documentos locais</p>
  </div>
  <div id="statusBadge" class="status-line">Carregando status...</div>
</header>

<nav>
  <button data-tab="chat" class="active">Perguntar</button>
  <button data-tab="search">Buscar</button>
  <button data-tab="documents">Documentos</button>
  <button data-tab="config">Configurações</button>
</nav>

<main>
  <section id="tab-chat" class="active">
    <div class="panel">
      <h2>Perguntas (RAG com IA local)</h2>
      <div id="chatLog" class="chat-log"></div>
      <div class="ask-row">
        <input type="text" id="questionInput" placeholder="Digite sua pergunta..." />
        <button class="primary" id="askButton">Perguntar</button>
      </div>
      <div id="askStatus" class="status-line"></div>
    </div>
  </section>

  <section id="tab-search">
    <div class="panel">
      <h2>Busca por palavras-chave (sem IA)</h2>
      <div class="ask-row">
        <input type="text" id="searchInput" placeholder="Termo de busca..." />
        <button class="primary" id="searchButton">Buscar</button>
      </div>
      <div class="row" style="margin-top: 0.75rem;">
        <div class="field">
          <label for="searchExtInput">Filtrar por extensão (opcional)</label>
          <input type="text" id="searchExtInput" placeholder=".pdf" />
        </div>
        <div class="field">
          <label for="searchFolderInput">Filtrar por pasta (opcional)</label>
          <input type="text" id="searchFolderInput" placeholder="C:\Users\voce\Documentos\Contratos" />
        </div>
        <div class="field">
          <label for="searchTagInput">Filtrar por tag (opcional)</label>
          <input type="text" id="searchTagInput" placeholder="ex.: contrato" list="availableTagsList" />
          <datalist id="availableTagsList"></datalist>
        </div>
      </div>
      <div id="searchResults" style="margin-top: 1rem;"></div>
    </div>
  </section>

  <section id="tab-documents">
    <div class="panel">
      <h2>Documentos indexados</h2>
      <button class="primary" id="refreshDocumentsButton">Atualizar lista</button>
      <div id="documentsList" style="margin-top: 1rem;"></div>
    </div>

    <div class="panel">
      <h2>Relatório da última indexação</h2>
      <div id="indexReport"></div>
    </div>
  </section>

  <section id="tab-config">
    <div class="panel">
      <h2>Indexar pasta de documentos</h2>
      <div class="field">
        <label for="folderInput">Caminho da pasta com seus documentos</label>
        <input type="text" id="folderInput" placeholder="C:\Users\voce\Documentos" />
      </div>
      <button class="primary" id="indexButton">Indexar</button>
      <div id="indexStatus" class="status-line"></div>
    </div>

    <div class="panel">
      <h2>Configurações</h2>

      <div class="field">
        <label for="llmProviderInput">Provedor de IA para geração de respostas</label>
        <select id="llmProviderInput">
          <option value="LlamaSharp">LlamaSharp (embutido, padrão)</option>
          <option value="Ollama">Ollama (servidor local)</option>
        </select>
      </div>

      <div class="field">
        <label for="modelPathInput">Caminho do modelo de IA local (.gguf) — usado quando o provedor é LlamaSharp</label>
        <input type="text" id="modelPathInput" placeholder="C:\Modelos\Phi-3-mini-4k-instruct.Q4_K_M.gguf" />
      </div>

      <div class="row">
        <div class="field">
          <label for="ollamaUrlInput">URL do servidor Ollama — usado quando o provedor é Ollama</label>
          <input type="text" id="ollamaUrlInput" placeholder="http://localhost:11434" />
        </div>
        <div class="field">
          <label for="ollamaModelInput">Modelo Ollama</label>
          <input type="text" id="ollamaModelInput" placeholder="llama3.2" />
        </div>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="ocrEnabledInput" style="width: auto; margin-right: 0.4rem;" />
          Habilitar OCR (Tesseract) para imagens e PDFs digitalizados
        </label>
      </div>

      <div class="row">
        <div class="field">
          <label for="tessDataPathInput">Pasta tessdata</label>
          <input type="text" id="tessDataPathInput" placeholder="C:\tessdata" />
        </div>
        <div class="field">
          <label for="ocrLanguagesInput">Idiomas do OCR (ex.: por+eng)</label>
          <input type="text" id="ocrLanguagesInput" placeholder="por+eng" />
        </div>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="embeddingsEnabledInput" style="width: auto; margin-right: 0.4rem;" />
          Habilitar embeddings e busca híbrida (BM25 + similaridade vetorial)
        </label>
      </div>

      <div class="row">
        <div class="field">
          <label for="embeddingModelPathInput">Modelo de embeddings (.onnx)</label>
          <input type="text" id="embeddingModelPathInput" placeholder="C:\Modelos\embeddings\model.onnx" />
        </div>
        <div class="field">
          <label for="embeddingTokenizerPathInput">Vocabulário do tokenizer (vocab.txt)</label>
          <input type="text" id="embeddingTokenizerPathInput" placeholder="C:\Modelos\embeddings\vocab.txt" />
        </div>
        <div class="field">
          <label for="hybridBm25WeightInput">Peso do BM25 na busca híbrida (0-1)</label>
          <input type="number" id="hybridBm25WeightInput" min="0" max="1" step="0.1" />
        </div>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="rerankingEnabledInput" style="width: auto; margin-right: 0.4rem;" />
          Habilitar re-ranking dos resultados com modelo cross-encoder
        </label>
      </div>

      <div class="row">
        <div class="field">
          <label for="rerankingModelPathInput">Modelo de re-ranking (.onnx)</label>
          <input type="text" id="rerankingModelPathInput" placeholder="C:\Modelos\reranking\model.onnx" />
        </div>
        <div class="field">
          <label for="rerankingTokenizerPathInput">Vocabulário do tokenizer (vocab.txt)</label>
          <input type="text" id="rerankingTokenizerPathInput" placeholder="C:\Modelos\reranking\vocab.txt" />
        </div>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="sttEnabledInput" style="width: auto; margin-right: 0.4rem;" />
          Habilitar transcrição de áudio (.wav 16kHz mono) via Whisper
        </label>
      </div>

      <div class="row">
        <div class="field">
          <label for="whisperModelPathInput">Modelo Whisper (ggml .bin)</label>
          <input type="text" id="whisperModelPathInput" placeholder="C:\Modelos\whisper\ggml-base.bin" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="indexPathInput">Pasta do índice</label>
          <input type="text" id="indexPathInput" />
        </div>
        <div class="field">
          <label for="topKInput">Trechos por pergunta (Top-K)</label>
          <input type="number" id="topKInput" min="1" max="20" />
        </div>
        <div class="field">
          <label for="contextSizeInput">Tamanho do contexto (tokens)</label>
          <input type="number" id="contextSizeInput" min="512" max="32768" step="256" />
        </div>
      </div>
      <button class="primary" id="saveConfigButton">Salvar configurações</button>
      <div id="configStatus" class="status-line"></div>
    </div>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);

document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('main section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    $(`tab-${btn.dataset.tab}`).classList.add('active');
  });
});

async function loadStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    const indexTxt = data.indexExists ? `${data.documentCount} trechos indexados` : 'sem índice ainda';

    let providerTxt;
    if (data.llmProvider === 'Ollama') {
      providerTxt = data.ollamaAvailable ? `Ollama (${data.ollamaModel}) pronto` : 'Ollama não disponível';
    } else {
      providerTxt = data.modelConfigured ? 'modelo de IA pronto' : 'modelo de IA não configurado';
    }

    $('statusBadge').textContent = `${indexTxt} · ${providerTxt}`;
    $('statusBadge').className = 'status-line ' + (data.indexExists ? 'status-ok' : '');
    return data;
  } catch (err) {
    $('statusBadge').textContent = 'Não foi possível conectar à API';
    $('statusBadge').className = 'status-line status-error';
  }
}

async function loadConfig() {
  const res = await fetch('/api/config');
  const config = await res.json();
  $('folderInput').value = config.documentsFolder || '';
  $('modelPathInput').value = config.modelPath || '';
  $('indexPathInput').value = config.indexPath || '';
  $('topKInput').value = config.topK || 5;
  $('contextSizeInput').value = config.contextSize || 4096;
  $('llmProviderInput').value = config.llmProvider || 'LlamaSharp';
  $('ollamaUrlInput').value = config.ollamaBaseUrl || 'http://localhost:11434';
  $('ollamaModelInput').value = config.ollamaModel || 'llama3.2';
  $('ocrEnabledInput').checked = !!config.ocrEnabled;
  $('tessDataPathInput').value = config.tessDataPath || '';
  $('ocrLanguagesInput').value = config.ocrLanguages || 'por+eng';
  $('embeddingsEnabledInput').checked = !!config.embeddingsEnabled;
  $('embeddingModelPathInput').value = config.embeddingModelPath || '';
  $('embeddingTokenizerPathInput').value = config.embeddingTokenizerPath || '';
  $('hybridBm25WeightInput').value = config.hybridBm25Weight ?? 0.5;
  $('rerankingEnabledInput').checked = !!config.rerankingEnabled;
  $('rerankingModelPathInput').value = config.rerankingModelPath || '';
  $('rerankingTokenizerPathInput').value = config.rerankingTokenizerPath || '';
  $('sttEnabledInput').checked = !!config.sttEnabled;
  $('whisperModelPathInput').value = config.whisperModelPath || '';
}

$('saveConfigButton').addEventListener('click', async () => {
  $('configStatus').textContent = 'Salvando...';
  $('configStatus').className = 'status-line';
  try {
    const current = await (await fetch('/api/config')).json();
    const updated = {
      ...current,
      documentsFolder: $('folderInput').value,
      modelPath: $('modelPathInput').value,
      indexPath: $('indexPathInput').value,
      topK: parseInt($('topKInput').value, 10) || 5,
      contextSize: parseInt($('contextSizeInput').value, 10) || 4096,
      llmProvider: $('llmProviderInput').value,
      ollamaBaseUrl: $('ollamaUrlInput').value,
      ollamaModel: $('ollamaModelInput').value,
      ocrEnabled: $('ocrEnabledInput').checked,
      tessDataPath: $('tessDataPathInput').value,
      ocrLanguages: $('ocrLanguagesInput').value,
      embeddingsEnabled: $('embeddingsEnabledInput').checked,
      embeddingModelPath: $('embeddingModelPathInput').value,
      embeddingTokenizerPath: $('embeddingTokenizerPathInput').value,
      hybridBm25Weight: parseFloat($('hybridBm25WeightInput').value) || 0.5,
      rerankingEnabled: $('rerankingEnabledInput').checked,
      rerankingModelPath: $('rerankingModelPathInput').value,
      rerankingTokenizerPath: $('rerankingTokenizerPathInput').value,
      sttEnabled: $('sttEnabledInput').checked,
      whisperModelPath: $('whisperModelPathInput').value
    };
    const res = await fetch('/api/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updated)
    });
    if (!res.ok) throw new Error(await res.text());
    $('configStatus').textContent = 'Configurações salvas.';
    $('configStatus').className = 'status-line status-ok';
    await loadStatus();
  } catch (err) {
    $('configStatus').textContent = `Erro ao salvar: ${err.message}`;
    $('configStatus').className = 'status-line status-error';
  }
});

$('indexButton').addEventListener('click', async () => {
  const folderPath = $('folderInput').value.trim();
  if (!folderPath) {
    $('indexStatus').textContent = 'Informe a pasta a indexar.';
    $('indexStatus').className = 'status-line status-error';
    return;
  }
  $('indexButton').disabled = true;
  $('indexStatus').textContent = 'Indexando... isso pode levar alguns minutos.';
  $('indexStatus').className = 'status-line';
  try {
    const res = await fetch('/api/index', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ folderPath })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Falha ao indexar.');
    $('indexStatus').textContent =
      `Concluído: ${data.filesProcessed} arquivos processados, ` +
      `${data.filesSkipped} ignorados, ${data.chunksIndexed} trechos indexados.` +
      (data.errors && data.errors.length ? `\nErros: ${data.errors.join('\n')}` : '');
    $('indexStatus').className = 'status-line status-ok';
    await loadStatus();
    await loadDocuments();
  } catch (err) {
    $('indexStatus').textContent = `Erro: ${err.message}`;
    $('indexStatus').className = 'status-line status-error';
  } finally {
    $('indexButton').disabled = false;
  }
});

// Splits a highlight string on the U+0001/U+0002 markers produced by the Lucene highlighter
// (SearchService) and appends the result to `container` as text nodes plus <mark> elements,
// so matched terms can be styled without using innerHTML on document-derived content.
function appendHighlighted(container, highlight) {
  const parts = highlight.split('');
  container.append(parts[0]);
  for (let i = 1; i < parts.length; i++) {
    const [matched, rest] = parts[i].split('');
    const mark = document.createElement('mark');
    mark.textContent = matched;
    container.append(mark, rest ?? '');
  }
}

function addChatMessage(role, text, sources) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  if (sources && sources.length) {
    const sourcesDiv = document.createElement('div');
    sourcesDiv.className = 'sources';
    sourcesDiv.append('Fontes: ');

    const seen = new Map();
    for (const s of sources) {
      if (!seen.has(s.sourcePath)) seen.set(s.sourcePath, s.fileName);
    }

    let first = true;
    for (const [path, fileName] of seen) {
      if (!first) sourcesDiv.append(', ');
      first = false;

      const link = document.createElement('a');
      link.href = 'file:///' + path.replace(/\\/g, '/');
      link.textContent = fileName;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      sourcesDiv.appendChild(link);
    }

    div.appendChild(sourcesDiv);
  }
  $('chatLog').appendChild(div);
  $('chatLog').scrollTop = $('chatLog').scrollHeight;
}

// Last few question/answer pairs, sent with each /api/ask request so the model has
// short-term conversational memory (e.g. for follow-up questions). Capped to mirror
// RagQueryEngine.MaxHistoryTurns.
const MAX_HISTORY_TURNS = 4;
const chatHistory = [];

$('askButton').addEventListener('click', async () => {
  const question = $('questionInput').value.trim();
  if (!question) return;
  addChatMessage('question', question);
  $('questionInput').value = '';
  $('askButton').disabled = true;
  $('askStatus').textContent = 'Pensando... (pode demorar na primeira pergunta, enquanto o modelo carrega)';
  $('askStatus').className = 'status-line';
  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, history: chatHistory.slice(-MAX_HISTORY_TURNS) })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Falha ao responder.');
    addChatMessage('answer', data.answer, data.sources);
    chatHistory.push({ question, answer: data.answer });
    $('askStatus').textContent = '';
  } catch (err) {
    addChatMessage('answer', `Erro: ${err.message}`);
    $('askStatus').textContent = '';
  } finally {
    $('askButton').disabled = false;
  }
});

$('questionInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $('askButton').click();
});

$('searchButton').addEventListener('click', async () => {
  const query = $('searchInput').value.trim();
  if (!query) return;
  const resultsEl = $('searchResults');
  resultsEl.textContent = 'Buscando...';
  try {
    const extension = $('searchExtInput').value.trim();
    const folderPath = $('searchFolderInput').value.trim();
    const tag = $('searchTagInput').value.trim();
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query,
        extension: extension || null,
        folderPath: folderPath || null,
        tag: tag || null
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Falha na busca.');

    resultsEl.replaceChildren();
    if (!data.length) {
      const empty = document.createElement('p');
      empty.textContent = 'Nenhum resultado encontrado.';
      resultsEl.appendChild(empty);
      return;
    }

    // Built via textContent/createElement (not innerHTML), since fileName/chunkText/sourcePath
    // come from the user's indexed documents and could otherwise inject markup/scripts.
    for (const r of data) {
      const item = document.createElement('div');
      item.className = 'result-item';

      const meta = document.createElement('div');
      meta.className = 'meta';

      const chunkBadge = document.createElement('span');
      chunkBadge.className = 'badge';
      chunkBadge.textContent = `trecho ${r.chunkIndex}`;

      const scoreBadge = document.createElement('span');
      scoreBadge.className = 'badge';
      scoreBadge.textContent = `score ${r.score.toFixed(2)}`;

      meta.append(`${r.fileName} `, chunkBadge, ' ', scoreBadge);

      const text = document.createElement('div');
      if (r.highlight) {
        appendHighlighted(text, r.highlight);
      } else {
        text.textContent = r.chunkText;
      }

      const source = document.createElement('div');
      source.className = 'meta';
      source.textContent = r.sourcePath;

      item.append(meta, text, source);
      resultsEl.appendChild(item);
    }
  } catch (err) {
    resultsEl.replaceChildren();
    const error = document.createElement('p');
    error.className = 'status-error';
    error.textContent = `Erro: ${err.message}`;
    resultsEl.appendChild(error);
  }
});

$('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $('searchButton').click();
});

// Built via textContent/createElement (not innerHTML), since file names/paths come from the
// user's indexed documents and could otherwise inject markup/scripts.
async function loadDocuments() {
  const listEl = $('documentsList');
  listEl.replaceChildren();
  listEl.append('Carregando...');

  try {
    const res = await fetch('/api/documents');
    const docs = await res.json();

    listEl.replaceChildren();
    if (!docs.length) {
      const empty = document.createElement('p');
      empty.textContent = 'Nenhum documento indexado.';
      listEl.appendChild(empty);
    } else {
      for (const doc of docs) {
        const item = document.createElement('div');
        item.className = 'doc-item';

        const info = document.createElement('div');
        info.className = 'info';
        const name = document.createElement('div');
        name.textContent = doc.fileName;
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `${doc.sourcePath} · ${doc.chunkCount} trecho(s)`;
        info.append(name, meta);

        const tagsRow = document.createElement('div');
        tagsRow.className = 'tags-row';

        const tagsInput = document.createElement('input');
        tagsInput.type = 'text';
        tagsInput.placeholder = 'tags separadas por vírgula';
        tagsInput.value = (doc.tags || []).join(', ');

        const saveTagsButton = document.createElement('button');
        saveTagsButton.textContent = 'Salvar tags';

        const tagsStatus = document.createElement('span');
        tagsStatus.className = 'status-line';

        saveTagsButton.addEventListener('click', () => saveTags(doc.sourcePath, tagsInput, tagsStatus));

        tagsRow.append(tagsInput, saveTagsButton, tagsStatus);
        info.append(tagsRow);

        const removeButton = document.createElement('button');
        removeButton.className = 'danger';
        removeButton.textContent = 'Remover';
        removeButton.addEventListener('click', () => removeDocument(doc.sourcePath));

        item.append(info, removeButton);
        listEl.appendChild(item);
      }
    }
  } catch (err) {
    listEl.replaceChildren();
    const error = document.createElement('p');
    error.className = 'status-error';
    error.textContent = `Erro ao carregar documentos: ${err.message}`;
    listEl.appendChild(error);
  }

  await loadIndexReport();
  await loadAvailableTags();
}

async function saveTags(path, inputEl, statusEl) {
  const tags = inputEl.value.split(',').map((t) => t.trim()).filter((t) => t.length > 0);
  statusEl.textContent = 'Salvando...';
  statusEl.className = 'status-line';
  try {
    const res = await fetch('/api/documents/tags', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path, tags })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Falha ao salvar tags.');
    inputEl.value = (data.tags || []).join(', ');
    statusEl.textContent = 'Salvo.';
    statusEl.className = 'status-line status-ok';
    await loadAvailableTags();
  } catch (err) {
    statusEl.textContent = `Erro: ${err.message}`;
    statusEl.className = 'status-line status-error';
  }
}

async function loadAvailableTags() {
  try {
    const res = await fetch('/api/tags');
    const tags = await res.json();
    const listEl = $('availableTagsList');
    listEl.replaceChildren();
    for (const tag of tags) {
      const option = document.createElement('option');
      option.value = tag;
      listEl.appendChild(option);
    }
  } catch {
    // Tag suggestions are a nice-to-have; ignore failures.
  }
}

async function loadIndexReport() {
  const reportEl = $('indexReport');
  reportEl.replaceChildren();

  try {
    const res = await fetch('/api/index-report');
    const report = await res.json();

    if (!report.errors?.length && !report.duplicates?.length) {
      const ok = document.createElement('p');
      ok.className = 'status-ok';
      ok.textContent = 'Nenhum erro ou duplicata na última indexação.';
      reportEl.appendChild(ok);
      return;
    }

    if (report.errors?.length) {
      const title = document.createElement('p');
      title.className = 'status-error';
      title.textContent = `Erros (${report.errors.length}):`;
      const list = document.createElement('ul');
      list.className = 'report-list';
      for (const error of report.errors) {
        const li = document.createElement('li');
        li.textContent = error;
        list.appendChild(li);
      }
      reportEl.append(title, list);
    }

    if (report.duplicates?.length) {
      const title = document.createElement('p');
      title.textContent = `Arquivos duplicados, não indexados novamente (${report.duplicates.length}):`;
      const list = document.createElement('ul');
      list.className = 'report-list';
      for (const dup of report.duplicates) {
        const li = document.createElement('li');
        li.textContent = `${dup.path} (idêntico a ${dup.duplicateOfPath})`;
        list.appendChild(li);
      }
      reportEl.append(title, list);
    }
  } catch (err) {
    const error = document.createElement('p');
    error.className = 'status-error';
    error.textContent = `Erro ao carregar relatório: ${err.message}`;
    reportEl.appendChild(error);
  }
}

async function removeDocument(path) {
  try {
    const res = await fetch(`/api/documents?path=${encodeURIComponent(path)}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Falha ao remover documento.');
    await loadDocuments();
    await loadStatus();
  } catch (err) {
    alert(`Erro ao remover documento: ${err.message}`);
  }
}

$('refreshDocumentsButton').addEventListener('click', loadDocuments);

loadStatus();
loadConfig();
loadDocuments();
</script>
